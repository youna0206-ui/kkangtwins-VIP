.wrap{max-width:520px;margin:0 auto;padding:.75rem}
.hd{background:linear-gradient(135deg,#E91E8C,#7B2FF7 60%,#3B82F6);border-radius:22px;padding:1.25rem 1.5rem;margin-bottom:1rem;color:#fff;display:flex;justify-content:space-between;align-items:flex-start;box-shadow:0 6px 24px rgba(233,30,140,.25)}
.hd-left .hd-tag{font-size:11px;opacity:.85;letter-spacing:.06em;margin-bottom:4px;font-weight:600}
.hd-left .hd-title{font-size:20px;font-weight:700}
.hd-sub{margin-top:6px;font-size:12px;opacity:.8}
.hd-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;margin-top:2px}
.hd-user{background:rgba(255,255,255,.25);border-radius:16px;padding:3px 10px;font-size:12px;font-weight:600}
.hd-btn{background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.5);color:#fff;border-radius:20px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer}
.tabs{display:flex;gap:5px;margin-bottom:1rem;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:.45rem .75rem;border-radius:20px;border:1.5px solid var(--br);background:var(--wh);color:var(--mu);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap}
.tab.on{background:linear-gradient(135deg,var(--pr),#7B2FF7);color:#fff;border-color:transparent;font-weight:700;box-shadow:0 2px 10px rgba(233,30,140,.3)}
.tab.at{border-color:#CDDFFE;color:var(--bl)}
.tab.at.on{background:linear-gradient(135deg,var(--bl),#7B2FF7);color:#fff;border-color:transparent}
.card{background:var(--wh);border:1.5px solid #F3D0E9;border-radius:var(--r);padding:.75rem 1rem;box-shadow:0 2px 12px rgba(233,30,140,.07)}
.sec{background:linear-gradient(135deg,#FDE8F4,#EFF6FF);border-radius:var(--r);padding:1rem 1.125rem;border:1.5px solid #E8C8F0}
.stack{display:flex;flex-direction:column;gap:10px}
.rb{display:flex;align-items:center;justify-content:space-between}
.pb{height:10px;background:#F9D0ED;border-radius:5px;overflow:hidden;margin:8px 0 3px}
.pb-f{height:100%;border-radius:5px;transition:width .5s;background:linear-gradient(90deg,var(--pr),var(--bl))}
.bd{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--grb);color:#16A34A;font-weight:700;white-space:nowrap;border:1px solid #BBF7D0}
.bv{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--bll);color:var(--bld);font-weight:700;white-space:nowrap;border:1px solid #BFDBFE}
.bw{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--orb);color:#D97706;white-space:nowrap;border:1px solid #FDE68A}
.wbdg{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--prl);color:var(--pr);font-weight:700;border:1px solid var(--br)}
.sbtn{font-size:12px;padding:6px 11px;border-radius:20px;border:1.5px solid var(--br);background:var(--wh);cursor:pointer;color:var(--mu);font-weight:500}
.sbtn.done{background:var(--grb);border-color:#BBF7D0;color:#16A34A;font-weight:700}
.sbtn.vac{background:var(--bll);border-color:#BFDBFE;color:var(--bld);font-weight:700}
.ir{display:flex;gap:8px;margin-bottom:10px}
.ir input,.ainp{flex:1;padding:.65rem .875rem;border-radius:var(--rs);border:1.5px solid var(--br);font-size:14px;background:var(--wh);color:var(--tx)}
.ir input:focus,.ainp:focus{outline:none;border-color:var(--pr)}
.abtn{padding:.6rem 1rem;border-radius:var(--rs);background:linear-gradient(135deg,var(--pr),#7B2FF7);color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap}
.abtn.sec{background:var(--bgd);color:var(--pr);border:1.5px solid var(--br)}
.abtn.full{width:100%;padding:.875rem;border-radius:var(--r);font-size:15px}
.abtn.sm{padding:.4rem .75rem;font-size:12px;border-radius:var(--rs)}
.st{font-size:14px;font-weight:700;margin-bottom:10px}
.dlb{background:none;border:none;cursor:pointer;color:#F9A8D4;font-size:16px;padding:0 2px}
.actb{font-size:12px;padding:4px 10px;border-radius:20px;border:1.5px solid var(--bl);background:var(--bll);cursor:pointer;color:var(--bl);font-weight:600}
.ws{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--br);background:var(--wh);cursor:pointer;font-size:16px;color:var(--pr);font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.stog{display:flex;align-items:center;justify-content:space-between;padding:.55rem .875rem;border-radius:var(--rs);background:var(--wh);font-size:13px;margin-bottom:5px;border:1.5px solid #F3D0E9}
.tgl{width:40px;height:22px;border-radius:11px;border:none;cursor:pointer;transition:background .2s;flex-shrink:0}
.tgl.on{background:linear-gradient(135deg,var(--pr),#7B2FF7)}.tgl.off{background:#E5E7EB}

.sc-label{display:flex;align-items:center;gap:8px;padding:.45rem .5rem;font-size:13px;cursor:pointer;border-radius:8px}
.sc-label:hover{background:var(--prl)}

.cat-hd{font-size:11px;font-weight:700;color:var(--pr);letter-spacing:.05em;padding:.4rem 0 .2rem}

.mexp-hd{background:var(--prl);padding:.65rem 1rem;font-size:13px;font-weight:700;color:var(--pr)}
.mexp-body{padding:.5rem 1rem 1rem}
select{width:100%;padding:.65rem .875rem;border-radius:var(--rs);border:1.5px solid var(--br);font-size:14px;background:var(--wh);color:var(--tx)}
select:focus{outline:none;border-color:var(--pr)}
.loading{text-align:center;padding:3rem 1rem;color:var(--mu);font-size:14px}
.sp{width:30px;height:30px;border:3px solid #F9D0ED;border-top-color:var(--pr);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;color:var(--mu);font-size:14px;padding:1.5rem 0}
.login-wrap{padding:.5rem 0}
.login-box{background:var(--wh);border:1.5px solid var(--br);border-radius:20px;padding:1.5rem;max-width:380px;margin:0 auto;box-shadow:0 2px 16px rgba(233,30,140,.1)}

.login-box p{font-size:13px;color:var(--mu);text-align:center;margin-bottom:1.25rem;line-height:1.6}
.lstack{display:flex;flex-direction:column;gap:10px}
.err{font-size:13px;color:var(--pr);text-align:center}
.ok{font-size:13px;color:var(--gr);text-align:center;font-weight:600}
.stat-box{flex:1;text-align:center;background:var(--wh);border-radius:var(--rs);padding:.875rem .5rem;border:1.5px solid #F3D0E9}
.stat-num{font-size:22px;font-weight:700;margin-top:4px}
.stat-label{font-size:11px;color:var(--mu);font-weight:500}
.fbox{background:var(--wh);border:1.5px solid #F3D0E9;border-radius:var(--r);padding:1rem}
.fg{flex:1;min-width:120px}
.fg label{font-size:11px;color:var(--mu);display:block;margin-bottom:4px;font-weight:600}
.rsum{display:flex;gap:6px;margin-bottom:8px}
.rsbox{flex:1;text-align:center;background:var(--prl);border-radius:var(--rs);padding:.5rem .25rem;border:1px solid var(--br)}
.rsnum{font-size:18px;font-weight:700}.rslbl{font-size:10px;color:var(--mu)}
.rtable{width:100%;border-collapse:collapse;font-size:12px}
.rtable th{background:var(--prl);color:var(--pr);font-weight:700;padding:.45rem .6rem;text-align:left;border-bottom:1.5px solid var(--br);white-space:nowrap}
.rtable td{padding:.4rem .6rem;border-bottom:1px solid #F9EDF5;vertical-align:middle}
.rtable tr:last-child td{border-bottom:none}
.tscroll{overflow-x:auto;border-radius:var(--r);border:1.5px solid #F3D0E9;max-height:400px;overflow-y:auto}

.wk-open{background:var(--prl);color:var(--pr);border-color:var(--pr)}

.lock-btn{font-size:11px;padding:3px 8px;border-radius:20px;border:1.5px solid;cursor:pointer;font-weight:600}
.lock-btn.locked{background:#F3F4F6;color:var(--mu);border-color:#E5E7EB}
.lock-btn.open{background:var(--grb);color:var(--gr);border-color:#BBF7D0}
.add-wk-btn{font-size:12px;padding:4px 10px;border-radius:20px;border:1.5px solid var(--pr);background:var(--prl);color:var(--pr);cursor:pointer;font-weight:600;white-space:nowrap}
.stab-btn{flex:0 0 auto;padding:.4rem .875rem;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;border:1.5px solid var(--br);background:var(--wh);color:var(--mu)}
.stab-btn.on{border-color:var(--pr);background:var(--prl);color:var(--pr);font-weight:700}
.apply-card{background:var(--wh);border:1.5px solid #F3D0E9;border-radius:var(--r);padding:.875rem 1rem}
.wk-curweek{background:linear-gradient(135deg,#F59E0B,#EF4444)!important;color:#fff!important;border-color:transparent!important;font-weight:800!important;box-shadow:0 2px 10px rgba(245,158,11,.5)!important;animation:pulse-wk 1.5s ease-in-out infinite!important;}
@keyframes pulse-wk{0%,100%{box-shadow:0 2px 10px rgba(245,158,11,.4);}50%{box-shadow:0 2px 18px rgba(245,158,11,.8);}}
.scard{background:var(--wh);border:1.5px solid #F3D0E9;border-radius:var(--r);overflow:hidden;transition:opacity .15s}
.scard.dragging{opacity:.4}
.scard.dragover{border-top:3px solid var(--pr)}
.drag-handle{font-size:18px;color:var(--mu);cursor:grab;flex-shrink:0;user-select:none}
.sinp-name{flex:1;font-size:13px;font-weight:600;border:none;background:transparent;outline:none;min-width:0;padding:2px 4px;border-radius:4px;color:var(--tx)}
.sinp-name:focus{background:var(--prl)}/* 🎉 컨페티 애니메이션 */
@keyframes confetti-fall{0%{transform:translateY(-10px) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}
@keyframes pop-in{0%{transform:translate(-50%,-50%) scale(0);}60%{transform:translate(-50%,-50%) scale(1.2);}100%{transform:translate(-50%,-50%) scale(1);}}
.confetti-piece{position:fixed;width:10px;height:10px;border-radius:2px;pointer-events:none;z-index:9998;animation:confetti-fall 1.2s ease-in forwards;}
.ck-pop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:52px;z-index:9999;pointer-events:none;animation:pop-in .4s cubic-bezier(.34,1.56,.64,1) forwards;}
/* 토스트 메시지 */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1E1E2E;color:#fff;padding:10px 20px;border-radius:30px;font-size:13px;font-weight:600;opacity:0;transition:all .35s ease;pointer-events:none;z-index:9999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.25);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.success{background:linear-gradient(135deg,#16A34A,#15803D);}
#toast.cancel{background:linear-gradient(135deg,#DC2626,#B91C1C);}
#toast.info{background:linear-gradient(135deg,var(--pr),#7B2FF7);}
</style>

function ckKey(sid,wn,mid){return sid+'__'+wn+'__'+mid;}
function ck(sid,wn,mid){return S.checkins[ckKey(sid,wn,mid)]||null;}
function setCk(sid,wn,mid,val){var k=ckKey(sid,wn,mid);if(val)S.checkins[k]=val;else delete S.checkins[k];}
function allWeeks(s){return s.weeks||[];}
function openWeeks(s){return allWeeks(s).filter(function(w){return !w.locked;});}

function showCompleteCard(studyName, memberName, weekCount){
  var modal=document.getElementById('complete-modal');
  var canvas=document.getElementById('complete-canvas');
  if(!modal||!canvas)return;
  var ctx=canvas.getContext('2d');
  var W=600,H=800;
  canvas.width=W;canvas.height=H;

  // 배경 골드 그라데이션
  var bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#1A1A2E');
  bg.addColorStop(0.4,'#16213E');
  bg.addColorStop(1,'#0F3460');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // 골드 테두리
  var border=ctx.createLinearGradient(0,0,W,H);
  border.addColorStop(0,'#FFD700');
  border.addColorStop(0.5,'#FFA500');
  border.addColorStop(1,'#FFD700');
  ctx.strokeStyle=border;ctx.lineWidth=8;
  ctx.strokeRect(16,16,W-32,H-32);
  ctx.strokeStyle='rgba(255,215,0,.3)';ctx.lineWidth=2;
  ctx.strokeRect(24,24,W-48,H-48);

  // 별 장식
  function drawStar(cx,cy,r,color){
    ctx.save();ctx.beginPath();ctx.fillStyle=color;
    for(var i=0;i<5;i++){
      var a=Math.PI/180*(72*i-90);
      var b=Math.PI/180*(72*i-90+36);
      i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
      ctx.lineTo(cx+r*0.4*Math.cos(b),cy+r*0.4*Math.sin(b));
    }
    ctx.closePath();ctx.fill();ctx.restore();
  }
  var stars=[[80,80,18],[520,80,14],[60,720,14],[540,720,18],[300,60,12],[150,150,8],[450,150,8]];
  stars.forEach(function(s){drawStar(s[0],s[1],s[2],'rgba(255,215,0,0.6)');});

  // 트로피 이모지
  ctx.font='120px serif';ctx.textAlign='center';
  ctx.shadowColor='rgba(255,200,0,.8)';ctx.shadowBlur=30;
  ctx.fillText('🏆',W/2,230);
  ctx.shadowBlur=0;

  // COMPLETE 텍스트
  var gold=ctx.createLinearGradient(0,250,0,310);
  gold.addColorStop(0,'#FFD700');gold.addColorStop(0.5,'#FFF8DC');gold.addColorStop(1,'#FFA500');
  ctx.fillStyle=gold;
  ctx.font='bold 52px sans-serif';
  ctx.shadowColor='rgba(255,165,0,.6)';ctx.shadowBlur=15;
  ctx.fillText('완  주  달  성',W/2,300);
  ctx.shadowBlur=0;

  // 구분선
  var line=ctx.createLinearGradient(80,0,W-80,0);
  line.addColorStop(0,'transparent');line.addColorStop(0.5,'#FFD700');line.addColorStop(1,'transparent');
  ctx.strokeStyle=line;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(80,330);ctx.lineTo(W-80,330);ctx.stroke();

  // 스터디 이름
  ctx.fillStyle='#FFF8DC';
  ctx.font='bold 38px sans-serif';
  // 긴 이름 줄바꿈
  var maxW=460,words=studyName.split('');
  var line1='',lines2=[];
  for(var i=0;i<words.length;i++){
    var test=line1+words[i];
    if(ctx.measureText(test).width>maxW&&line1){
      lines2.push(line1);line1=words[i];
    } else line1=test;
  }
  lines2.push(line1);
  var sy=390;
  lines2.forEach(function(l){ctx.fillText(l,W/2,sy);sy+=50;});

  // 닉네임
  ctx.fillStyle='#FFD700';
  ctx.font='bold 44px sans-serif';
  ctx.shadowColor='rgba(255,200,0,.5)';ctx.shadowBlur=10;
  ctx.fillText(memberName,W/2,sy+40);
  ctx.shadowBlur=0;

  // 주차
  ctx.fillStyle='rgba(255,248,220,.8)';
  ctx.font='28px sans-serif';
  ctx.fillText(weekCount+'주 완주 🎉',W/2,sy+100);

  // 날짜
  var today=new Date();
  var dateStr=today.getFullYear()+'.'+(today.getMonth()+1+'').padStart(2,'0')+'.'+( today.getDate()+'').padStart(2,'0');
  ctx.fillStyle='rgba(255,215,0,.6)';
  ctx.font='22px sans-serif';
  ctx.fillText(dateStr,W/2,sy+150);

  // 구분선2
  ctx.strokeStyle=line;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(80,sy+175);ctx.lineTo(W-80,sy+175);ctx.stroke();

  // 인스타 태그
  ctx.fillStyle='rgba(255,215,0,.5)';
  ctx.font='20px sans-serif';
  ctx.fillText('@kkang_twins_',W/2,sy+215);

  // 모달 표시
  modal.style.display='flex';

  // 저장 버튼
  var saveBtn=document.getElementById('complete-save');
  if(saveBtn){
    saveBtn.onclick=function(){
      var a=document.createElement('a');
      a.href=canvas.toDataURL('image/png');
      a.download='완주_'+memberName+'_'+studyName+'.png';
      a.click();
    };
  }
  // 닫기
  var closeBtn=document.getElementById('complete-close');
  if(closeBtn)closeBtn.onclick=function(){modal.style.display='none';};
  modal.onclick=function(e){if(e.target===modal)modal.style.display='none';};
}
function showCelebration(emoji){
  // 이모지 팝
  var pop=document.createElement('div');
  pop.className='ck-pop';
  pop.textContent=emoji||'🎉';

  var colors=['#FF6B9D','#FFD93D','#6BCB77','#4D96FF','#C77DFF','#FF9A3C'];
  for(var i=0;i<22;i++){
    (function(i){

        var c=document.createElement('div');
        c.className='confetti-piece';
        c.style.cssText='left:'+Math.random()*100+'vw;top:-10px;background:'+colors[Math.floor(Math.random()*colors.length)]+
          ';width:'+(6+Math.random()*8)+'px;height:'+(6+Math.random()*8)+'px;'+

        document.body.appendChild(c);
        setTimeout(function(){c.remove();},1600);
      },i*40);
    })(i);
  }
}
function showToast(msg,type,dur){
  var t=document.getElementById('toast');
  if(!t)return;
  t.textContent=msg;
  t.className='show '+(type||'info');
  clearTimeout(t._timer);
  t._timer=setTimeout(function(){t.className='';},dur||2500);
}
function mCurSt(m){
  var my=S.studies.filter(function(s){return s.active&&(m.studyIds||[]).indexOf(s.id)>=0;});
  var dn=0,tot=0;
  my.forEach(function(s){openWeeks(s).forEach(function(w){tot++;if(ck(s.id,w.num,m.id)==='done')dn++;});});
  return{total:tot,done:dn,pct:tot?Math.round(dn/tot*100):0};
}
function getCurrentWeek(s){
  if(!s.startDate)return 0;
  var start=new Date(s.startDate);start.setHours(0,0,0,0);
  var now=new Date();now.setHours(0,0,0,0);
  var diff=now-start;
  if(diff<0)return 0;
  return Math.floor(diff/(7*24*60*60*1000))+1;
}
function isStudyComplete(s,m){
  var aw=allWeeks(s);
  return aw.length>0&&aw.every(function(w){return ck(s.id,w.num,m.id)==='done';});
}
// 완주 뱃지 판정: 💎 다이아(5주완주) / 🥈 은메달(8주이상 8주이상인증) / 🥇 금메달(8주이상 전체완주)
function getStudyBadge(s,m){
  var aw=allWeeks(s);
  if(!aw.length)return null;
  var doneCount=aw.filter(function(w){return ck(s.id,w.num,m.id)==='done';}).length;
  var totalWks=aw.length;
  var allDone=doneCount===totalWks;
  if(totalWks===5&&allDone)return{badge:'💎',label:'다이아',color:'#22D3EE',bg:'#ECFEFF'};
  if(totalWks>=8&&allDone)return{badge:'🥇',label:'금메달',color:'#D97706',bg:'#FEF3C7'};
  if(totalWks>=8&&doneCount>=8)return{badge:'🥈',label:'은메달',color:'#6B7280',bg:'#F3F4F6'};
  return null;
}
// 멤버의 전체 뱃지 목록
function getMemberBadges(m){
  var badges=[];
  S.studies.filter(function(s){return s.active&&(m.studyIds||[]).indexOf(s.id)>=0;}).forEach(function(s){
    var b=getStudyBadge(s,m);
    if(b)badges.push({study:s,badge:b});
  });
  return badges;
}
function mTotSt(m){
  var my=S.studies.filter(function(s){return s.active&&(m.studyIds||[]).indexOf(s.id)>=0;});
  var tw=0,dw=0,vw=0;
  my.forEach(function(s){allWeeks(s).forEach(function(w){tw++;var st=ck(s.id,w.num,m.id);if(st==='done')dw++;else if(st==='vacation')vw++;});});
  return{tw:tw,dw:dw,vw:vw,pct:tw?Math.round(dw/tw*100):0,cnt:my.length};
}
function sMSt(s,m){
  var aw=allWeeks(s);var dn=0,vc=0;
  aw.forEach(function(w){var st=ck(s.id,w.num,m.id);if(st==='done')dn++;else if(st==='vacation')vc++;});
  return{t:aw.length,dn:dn,vc:vc,pct:aw.length?Math.round(dn/aw.length*100):0};
}

// ── 습관 현황 섹션 (내 현황 탭 하단) ──
function rHabitStatusSection(m){
  if(!m)return '';
  var H=S.habits||{};
  var AH=S.adminHabits||{};
  var myH=H[m.id]||{};
  var today=new Date();
  var holidays=['01-01','03-01','05-05','06-06','08-15','10-03','10-09','12-25'];
  function isOff(d){var mmdd=(d.getMonth()+1+'').padStart(2,'0')+'-'+(d.getDate()+'').padStart(2,'0');return d.getDay()===0||d.getDay()===6||holidays.indexOf(mmdd)>=0;}
  function dateKey(d){return d.getFullYear()+'-'+(d.getMonth()+1+'').padStart(2,'0')+'-'+(d.getDate()+'').padStart(2,'0');}

  var allH=[];
  Object.keys(myH).forEach(function(hid){if(myH[hid]&&!hid.startsWith('__'))allH.push({hid:hid,name:myH[hid].name,isAdmin:false,checks:myH[hid].checks||{}});});
  Object.keys(AH).forEach(function(ahid){
    var ah=AH[ahid];if(!ah||(!(ah.members||[]).includes(m.id)))return;
    var ck=myH['__admin__'+ahid]||{};
    allH.push({hid:ahid,name:ah.name,isAdmin:true,checks:ck.checks||{}});
  });

  if(!allH.length)return '';

  var h='<div class="sec rb" style="padding:.875rem;margin-top:8px;">';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">';
  h+='<div style="font-size:13px;font-weight:700;color:var(--pr);">🌱 습관 현황 <span style="font-size:11px;font-weight:400;color:var(--mu);">(최근 30일 주중)</span></div>';
  h+='<button class="abtn sm sec" data-habit-mgr="1">관리 →</button>';
  h+='</div>';

  allH.forEach(function(item){
    var checks=item.checks;
    // 30일 주중 달성률
    var total=0,done=0,streak=0,bonusWe=0;
    for(var i=0;i<30;i++){
      var dd=new Date(today);dd.setDate(dd.getDate()-i);
      var dk=dateKey(dd);
      if(isOff(dd)){if(checks[dk])bonusWe++;continue;}
      total++;if(checks[dk])done++;
    }
    // streak (주중만)
    for(var i=0;i<365;i++){
      var dd=new Date(today);dd.setDate(dd.getDate()-i);
      if(isOff(dd))continue;
      if(checks[dateKey(dd)])streak++;else break;
    }
    var pct=total?Math.round(done/total*100):0;
    var col=pct>=80?'var(--pr)':pct>=50?'#F59E0B':'var(--mu)';

    // 최근 14일 미니 캘린더
    var miniDays=[];
    for(var i=13;i>=0;i--){
      var dd=new Date(today);dd.setDate(dd.getDate()-i);
      miniDays.push({done:checks[dateKey(dd)]===true,off:isOff(dd),isToday:i===0});
    }

    h+='<div style="margin-bottom:12px;">';
    h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;">';
    h+='<span style="flex:1;font-size:13px;font-weight:700;">'+esc(item.name)+(item.isAdmin?'<span style="font-size:9px;color:var(--mu);margin-left:3px;">공용</span>':'')+'</span>';
    if(streak>0)h+='<span style="font-size:11px;color:#F59E0B;font-weight:700;">🔥'+streak+'일</span>';
    if(bonusWe>0)h+='<span style="font-size:10px;color:#16A34A;font-weight:700;">+'+bonusWe+'🎁</span>';
    h+='<span style="font-size:11px;font-weight:700;color:'+col+';">'+pct+'%</span>';
    h+='</div>';
    // 진행 바
    h+='<div style="height:6px;background:#F3F4F6;border-radius:3px;margin-bottom:6px;overflow:hidden;">';
    h+='<div style="width:'+pct+'%;height:100%;background:'+col+';border-radius:3px;"></div></div>';
    // 미니 14일 도트
    h+='<div style="display:flex;gap:3px;">';
    miniDays.forEach(function(d){
      h+='<div style="flex:1;height:8px;border-radius:2px;'+
        (d.done?'background:var(--pr);':d.off?'background:#FEF2F2;':'background:#F3F4F6;')+
        (d.isToday?'outline:1.5px solid var(--pr);outline-offset:1px;':'')+
      '"></div>';
    });
    h+='</div>';
    h+='</div>';
  });

  h+='</div>';
  return h;
}

        var bg=wst==='done'?'var(--grb)':wst==='vacation'?'var(--bll)':'#F3F4F6';
        var cl=wst==='done'?'#16A34A':wst==='vacation'?'var(--bld)':'var(--mu)';
        return '<span style="font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;border:1.5px solid '+(w.locked?'#E5E7EB':'var(--pr)')+';background:'+bg+';color:'+cl+';">'+(w.locked?'🔒':'🔓')+w.num+'주</span>';
      }).join('');
      h+='<div class="card" style="padding:.875rem 1rem;margin-left:4px;">'+
        '<div class="rb" style="margin-bottom:4px;">'+
          '<span style="font-size:13px;font-weight:600;">'+esc(s.name)+'</span>'+
          '<span class="wbdg">'+ss.dn+'/'+ss.t+'주 '+ss.pct+'%</span>'+
        '</div>'+
        '<div style="font-size:11px;color:var(--mu);margin-bottom:5px;">'+
          (s.dayOfWeek?esc(s.dayOfWeek)+'요일 시작 · ':'')+
          '총 '+ss.t+'주 · 🏖️'+ss.vc+'주'+
        '</div>'+
        '<div class="pb"><div class="pb-f" style="width:'+ss.pct+'%;"></div></div>'+
        '<div style="display:flex;gap:3px;margin-top:8px;flex-wrap:wrap;">'+chips+'</div>'+
      '</div>';
    });
  });

  return h+'</div>';
}

function rHabit(){
  var im=S.loggedMember,ia=S.isAdmin;
  if(!im&&!ia)return rML();
  var me=im||(S.members.filter(function(x){return x.name&&x.name.indexOf('강둥맘')>=0;})[0]);
  if(!me)return '<div class="sec">멤버 정보를 찾을 수 없어요</div>';

  var today=new Date();
  var todayKey=today.getFullYear()+'-'+(today.getMonth()+1+'').padStart(2,'0')+'-'+(today.getDate()+'').padStart(2,'0');
  var holidays=['01-01','03-01','05-05','06-06','08-15','10-03','10-09','12-25'];
  function isWeekend(d){return d.getDay()===0||d.getDay()===6;}
  function isHoliday(d){var mmdd=(d.getMonth()+1+'').padStart(2,'0')+'-'+(d.getDate()+'').padStart(2,'0');return holidays.indexOf(mmdd)>=0;}
  function isOff(d){return isWeekend(d)||isHoliday(d);}
  function dateKey(d){return d.getFullYear()+'-'+(d.getMonth()+1+'').padStart(2,'0')+'-'+(d.getDate()+'').padStart(2,'0');}

  var H=S.habits||{};
  var AH=S.adminHabits||{};
  var myH=H[me.id]||{};
  // visibility: S.habits.__vis[memberId][habitId] = true/false
  var VIS=(H.__vis&&H.__vis[me.id])||{};

  var h='<div class="stack">';
  h+='<div style="display:flex;gap:6px;margin-bottom:4px;">';
  h+='<button class="abtn sm'+(S.habitTab==='my'?'':' sec')+'" data-htab="my">🌱 내 습관</button>';
  h+='<button class="abtn sm'+(S.habitTab==='all'?'':' sec')+'" data-htab="all">👥 전체 현황</button>';
  if(ia)h+='<button class="abtn sm'+(S.habitTab==='admin'?'':' sec')+'" data-htab="admin">⚙️ 습관 관리</button>';
  h+='</div>';

  // ── 관리자 습관 관리 탭 ──
  if(S.habitTab==='admin'&&ia){
    h+='<div class="sec rb" style="padding:.875rem;">';
    h+='<div style="font-size:13px;font-weight:700;color:var(--pr);margin-bottom:8px;">➕ 공용 습관 추가</div>';
    h+='<div style="display:flex;gap:8px;margin-bottom:8px;">';
    h+='<input class="ainp" id="admin-habit-name" placeholder="공용 습관 이름" style="flex:1;font-size:13px;" maxlength="30">';
    h+='<button class="abtn sm" id="admin-habit-add-btn">추가</button>';
    h+='</div></div>';

    var ahIds=Object.keys(AH);
    if(!ahIds.length){
      h+='<div class="sec rb" style="text-align:center;padding:1.5rem;color:var(--mu);font-size:13px;">공용 습관이 없어요</div>';
    } else {
      ahIds.forEach(function(ahid){
        var ah=AH[ahid];if(!ah)return;
        var enrolled=(ah.members||[]);
        h+='<div class="sec rb" style="padding:.875rem;margin-bottom:0;">';
        h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">';
        h+='<span style="flex:1;font-size:14px;font-weight:700;">'+esc(ah.name)+'</span>';
        h+='<span style="font-size:11px;color:var(--mu);">'+enrolled.length+'명 신청중</span>';
        h+='<button data-admin-habit-del="'+ahid+'" style="font-size:11px;padding:2px 8px;border-radius:10px;border:1px solid #FECACA;background:#FFF5F5;color:var(--rd);cursor:pointer;">삭제</button>';
        h+='</div>';
        // 멤버별 공개/비공개 설정
        if(enrolled.length){
          h+='<div style="font-size:11px;color:var(--mu);margin-bottom:6px;">멤버별 공개 설정</div>';
          h+='<div style="display:flex;flex-wrap:wrap;gap:4px;">';
          enrolled.forEach(function(mid){
            var mem=S.members.filter(function(x){return x.id===mid;})[0];
            if(!mem)return;
            var vis=AH[ahid].visibility&&AH[ahid].visibility[mid];
            h+='<button data-admin-vis="'+ahid+'__'+mid+'" style="font-size:10px;padding:2px 8px;border-radius:20px;border:1.5px solid '+(vis?'var(--pr)':'var(--br)')+';background:'+(vis?'var(--prl)':'var(--wh)')+';color:'+(vis?'var(--pr)':'var(--mu)')+';cursor:pointer;">'+esc(mem.name)+' '+(vis?'🌍':'🔒')+'</button>';
          });
          h+='</div>';
        }
        h+='</div>';
      });
    }
    return h+'</div>';
  }

  // ── 내 습관 탭 ──
  if(S.habitTab==='my'){
    // 개인 습관 추가
    h+='<div class="sec rb" style="padding:.875rem;">';
    h+='<div style="font-size:13px;font-weight:700;color:var(--pr);margin-bottom:8px;">✨ 내 습관 추가</div>';
    h+='<div style="display:flex;gap:8px;">';
    h+='<input class="ainp" id="habit-name-inp" placeholder="새 습관 (예: 물 2L 마시기)" style="flex:1;font-size:13px;" maxlength="30">';
    h+='<button class="abtn sm" id="habit-add-btn">추가</button>';
    h+='</div></div>';

    // 공용 습관 신청 가능 목록
    var availAH=Object.keys(AH).filter(function(ahid){return AH[ahid]&&!(AH[ahid].members||[]).includes(me.id);});
    if(availAH.length){
      h+='<div class="sec rb" style="padding:.875rem;">';
      h+='<div style="font-size:12px;font-weight:700;color:var(--pr);margin-bottom:8px;">📋 공용 습관 신청</div>';
      availAH.forEach(function(ahid){
        var ah=AH[ahid];
        h+='<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #F3F4F6;">';
        h+='<span style="flex:1;font-size:13px;font-weight:600;">'+esc(ah.name)+'</span>';
        h+='<span style="font-size:11px;color:var(--mu);">'+(ah.members||[]).length+'명 참여중</span>';
        h+='<button class="abtn sm" data-admin-habit-join="'+ahid+'">신청하기</button>';
        h+='</div>';
      });
      h+='</div>';
    }

    // 내가 신청한 공용 습관
    var myAH=Object.keys(AH).filter(function(ahid){return AH[ahid]&&(AH[ahid].members||[]).includes(me.id);});

    // 개인 습관 + 공용 습관 합쳐서 표시
    var allHabits=[];
    Object.keys(myH).forEach(function(hid){if(myH[hid])allHabits.push({hid:hid,hab:myH[hid],isAdmin:false});});
    myAH.forEach(function(ahid){if(AH[ahid])allHabits.push({hid:ahid,hab:AH[ahid],isAdmin:true});});

    if(!allHabits.length){
      h+='<div class="sec rb" style="text-align:center;padding:2rem;color:var(--mu);font-size:13px;">아직 등록된 습관이 없어요 🌱</div>';
    } else {
      allHabits.forEach(function(item){
        var hid=item.hid,hab=item.hab,isAdmin=item.isAdmin;
        var checks=isAdmin?(H[me.id]&&H[me.id]['__admin__'+hid]&&H[me.id]['__admin__'+hid].checks)||{}:hab.checks||{};
        var comments=isAdmin?(H[me.id]&&H[me.id]['__admin__'+hid]&&H[me.id]['__admin__'+hid].comments)||{}:hab.comments||{};
        // 공개 여부 - 개인이 직접 설정 or 관리자가 설정
        var myVis=isAdmin?(AH[hid].visibility&&AH[hid].visibility[me.id]):VIS[hid];
        var isPublic=myVis===true;
        var checkedToday=checks[todayKey]===true;
        var isMonthView=S.habitView===('month__'+hid);
        var isEditDay=S.editHabitDay&&S.editHabitDay.startsWith(hid+'__');
        var editDk=isEditDay?S.editHabitDay.split('__')[1]:null;

        // 주중만 달성률 계산
        var streak=0,totalWd=0,doneWd=0,bonusWe=0;
        for(var i=0;i<30;i++){
          var dd=new Date(today);dd.setDate(dd.getDate()-i);
          var dk2=dateKey(dd);
          var done2=checks[dk2];
          if(isOff(dd)){if(done2)bonusWe++;continue;}
          totalWd++;
          if(done2)doneWd++;
        }
        for(var i=0;i<365;i++){
          var dd=new Date(today);dd.setDate(dd.getDate()-i);
          if(isOff(dd))continue; // 주말 연속 streak에서 제외
          if(checks[dateKey(dd)])streak++;else break;
        }
        var pct=totalWd?Math.round(doneWd/totalWd*100):0;

        h+='<div class="sec rb" style="padding:.875rem;'+(checkedToday?'border:1.5px solid var(--pr);background:var(--prl);':'')+'margin-bottom:0;">';
        // 헤더
        h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">';
        h+='<span style="flex:1;font-size:14px;font-weight:700;color:'+(checkedToday?'var(--pr)':'var(--tx)')+';">'+esc(hab.name)+(isAdmin?'<span style="font-size:10px;color:var(--mu);margin-left:4px;">공용</span>':'')+'</span>';
        if(streak>0)h+='<span style="font-size:11px;color:#F59E0B;font-weight:700;">🔥'+streak+'일</span>';
        h+='<span style="font-size:11px;color:var(--mu);">30일 '+pct+'%</span>';
        if(bonusWe>0)h+='<span style="font-size:10px;color:#16A34A;font-weight:700;">+'+bonusWe+'보너스</span>';
        // 공개/비공개 (개인이 직접 설정)
        h+='<button data-habit-pub="'+me.id+'__'+hid+'__'+(isAdmin?'admin':'personal')+'" style="font-size:10px;padding:2px 7px;border-radius:10px;border:1.5px solid '+(isPublic?'var(--pr)':'var(--br)')+';background:'+(isPublic?'var(--prl)':'var(--wh)')+';color:'+(isPublic?'var(--pr)':'var(--mu)')+';cursor:pointer;">'+(isPublic?'🌍 공개':'🔒 비공개')+'</button>';
        if(!isAdmin)h+='<button data-habit-del="'+me.id+'__'+hid+'" style="font-size:11px;padding:2px 6px;border-radius:10px;border:1px solid #FECACA;background:#FFF5F5;color:var(--rd);cursor:pointer;">삭제</button>';
        else h+='<button data-admin-habit-leave="'+hid+'" style="font-size:11px;padding:2px 6px;border-radius:10px;border:1px solid #FCD34D;background:#FFFBEB;color:#D97706;cursor:pointer;">취소</button>';
        h+='</div>';

        // 주간/월별 전환
        h+='<div style="display:flex;align-items:center;gap:4px;margin-bottom:8px;">';
        h+='<button class="abtn sm'+(!isMonthView?'':' sec')+'" data-hview="week__'+hid+'">주간</button>';
        h+='<button class="abtn sm'+(isMonthView?'':' sec')+'" data-hview="month__'+hid+'">월별</button>';
        if(isMonthView){
          var ymKey=S.habitYM||today.getFullYear()+'-'+(today.getMonth()+1+'').padStart(2,'0');
          var yma=ymKey.split('-');var yr=+yma[0],mo=+yma[1]-1;
          var prevYm=mo===0?(yr-1)+'-12':yr+'-'+(mo+'').padStart(2,'0');
          var nextYm=mo===11?(yr+1)+'-01':yr+'-'+(mo+2+'').padStart(2,'0');
          h+='<button class="abtn sm sec" data-hym="'+prevYm+'__'+hid+'">◀</button>';
          h+='<span style="font-size:12px;font-weight:700;color:var(--pr);padding:0 4px;">'+(mo+1)+'월</span>';
          h+='<button class="abtn sm sec" data-hym="'+nextYm+'__'+hid+'">▶</button>';
        }
        h+='</div>';

        // 월별 달력
        if(isMonthView){
          var ymKey=S.habitYM||today.getFullYear()+'-'+(today.getMonth()+1+'').padStart(2,'0');
          var yma=ymKey.split('-');var yr=+yma[0],mo=+yma[1]-1;
          var firstDay=new Date(yr,mo,1).getDay();
          var lastDate=new Date(yr,mo+1,0).getDate();
          h+='<div style="margin-bottom:10px;">';
          h+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px;">';
          ['일','월','화','수','목','금','토'].forEach(function(d,i){
            h+='<div style="text-align:center;font-size:10px;font-weight:700;padding:2px;color:'+(i===0?'#EF4444':i===6?'#3B82F6':'var(--mu)')+';">'+d+'</div>';
          });
          h+='</div>';
          h+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;">';
          for(var i=0;i<firstDay;i++)h+='<div></div>';
          for(var d=1;d<=lastDate;d++){
            var dk2=yr+'-'+(mo+1+'').padStart(2,'0')+'-'+(d+'').padStart(2,'0');
            var done2=checks[dk2]===true;
            var cmt2=comments[dk2]||'';
            var dateObj=new Date(yr,mo,d);
            var isOff2=isOff(dateObj);
            var isToday2=dk2===todayKey;
            var dow=dateObj.getDay();
            var textColor=done2?'#fff':isOff2?'#EF4444':dow===6?'#3B82F6':'var(--tx)';
            var isEditing=editDk===dk2;
            h+='<div style="text-align:center;" title="'+(cmt2?esc(cmt2):'')+'">';
            h+='<div data-habit-day="'+hid+'__'+dk2+'" style="width:100%;aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;cursor:pointer;'+
              (done2?'background:var(--pr);':'background:'+(isOff2?'#FEF2F2':'#F8F9FA')+';')+
              (isToday2?'outline:2px solid var(--pr);outline-offset:1px;':'')+
              (isEditing?'outline:2px solid #F59E0B;outline-offset:1px;':'')+
              'color:'+textColor+';">'+d+'</div>';
            if(cmt2)h+='<div style="font-size:8px;color:var(--pr);margin-top:1px;">💬</div>';
            h+='</div>';
          }
          h+='</div></div>';
        }

        // 주간 7일 (세로)
        if(!isMonthView){
          var days7=[];
          for(var i=6;i>=0;i--){
            var dd=new Date(today);dd.setDate(dd.getDate()-i);
            var dk=dateKey(dd);
            days7.push({dk:dk,dow:['일','월','화','수','목','금','토'][dd.getDay()],done:checks[dk]===true,comment:comments[dk]||'',isToday:i===0,isOff:isOff(dd),dayNum:dd.getDay()});
          }
          h+='<div style="display:flex;flex-direction:column;gap:4px;margin-bottom:10px;">';
          days7.forEach(function(day){
            var isRed=day.isOff;
            var isBlu=day.dayNum===6&&!day.isOff;
            var isEditing=editDk===day.dk;
            h+='<div style="border-radius:10px;overflow:hidden;border:1.5px solid '+(isEditing?'#F59E0B':day.isToday?'var(--pr)':day.done?'#BBF7D0':'#F3F4F6')+';">';
            // 날짜 행
            h+='<div data-habit-day="'+hid+'__'+day.dk+'" style="display:flex;align-items:center;gap:10px;padding:7px 10px;cursor:pointer;background:'+(day.isToday?'var(--prl)':day.done?'#F0FDF4':isRed?'#FEF2F2':'var(--wh)')+'">';
            h+='<span style="font-size:12px;font-weight:'+(day.isToday?'800':'600')+';min-width:22px;color:'+(day.isToday?'var(--pr)':isRed?'#EF4444':isBlu?'#3B82F6':'var(--mu)')+'">'+(day.isToday?'⭐ ':'')+day.dow+'</span>';
            h+='<span style="font-size:11px;color:var(--mu);min-width:42px;">'+day.dk.slice(5).replace('-','/')+'</span>';
            if(day.isOff)h+='<span style="font-size:10px;color:#EF4444;background:#FEF2F2;padding:1px 6px;border-radius:10px;">휴일</span>';
            h+='<div style="width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;'+
              (day.done?'background:var(--pr);color:#fff;':'background:#F3F4F6;color:var(--mu);')+'">'+(day.done?'✓':'')+'</div>';
            h+='<span style="flex:1;font-size:11px;color:'+(day.done?'#16A34A':day.isToday?'var(--pr)':'var(--mu)')+';">'+(day.done?'완료 ✅':day.isToday?'← 오늘':'미완')+'</span>';
            if(day.comment)h+='<span style="font-size:10px;color:var(--pr);">💬</span>';
            h+='<span style="font-size:10px;color:var(--mu);">✏️</span>';
            h+='</div>';
            // 편집 패널
            if(isEditing){
              h+='<div style="padding:8px 10px;background:#FFFBEB;border-top:1px solid #FCD34D;">';
              h+='<div style="display:flex;gap:6px;margin-bottom:6px;">';
              h+='<button data-habit-set="'+hid+'__'+day.dk+'__done" style="flex:1;font-size:12px;padding:4px;border-radius:8px;border:none;cursor:pointer;font-weight:700;'+(day.done?'background:var(--pr);color:#fff;':'background:#DCFCE7;color:#16A34A;')+'">✅ 달성</button>';
              h+='<button data-habit-set="'+hid+'__'+day.dk+'__undone" style="flex:1;font-size:12px;padding:4px;border-radius:8px;border:none;cursor:pointer;font-weight:700;'+(!day.done?'background:#F3F4F6;color:var(--mu);':'background:#F3F4F6;color:var(--mu);')+'">✕ 미달성</button>';
              h+='</div>';
              h+='<input class="ainp" id="habit-cmt-'+hid+'_'+day.dk.replace(/-/g,'')+'" placeholder="한줄 코멘트 (선택)" style="width:100%;font-size:12px;" maxlength="50" value="'+esc(day.comment)+'">';
              h+='<div style="display:flex;gap:6px;margin-top:6px;">';
              h+='<button data-habit-cmt-save="'+hid+'__'+day.dk+'" class="abtn sm" style="flex:1;">저장</button>';
              h+='<button data-habit-day-close style="flex:1;font-size:12px;padding:3px 8px;border-radius:20px;border:1px solid var(--br);background:var(--wh);color:var(--mu);cursor:pointer;">닫기</button>';
              h+='</div></div>';
            }
            h+='</div>';
          });
          h+='</div>';
        }

        // 오늘 체크 버튼
        h+='<button class="abtn'+(checkedToday?' sec':'')+'" data-habit-ck="'+me.id+'__'+hid+(isAdmin?'__admin':'')+'" style="width:100%;font-size:13px;font-weight:700;'+(checkedToday?'':'background:linear-gradient(135deg,var(--pr),#7B2FF7);color:#fff;')+'">';
        h+=checkedToday?'✅ 오늘 완료! (클릭으로 취소)':'🌱 오늘 체크하기';
        h+='</button>';
        h+='</div>';
      });
    }
  }

  // ── 전체 현황 탭 ──
  if(S.habitTab==='all'){
    h+='<div class="sec rb" style="padding:.875rem;">';
    h+='<div style="font-size:13px;font-weight:700;color:var(--pr);margin-bottom:12px;">📅 오늘 '+todayKey.replace(/-/g,'.')+'</div>';
    var todayCheckers=[];
    S.members.forEach(function(mem){
      var mH=H[mem.id]||{};
      var memVis=(H.__vis&&H.__vis[mem.id])||{};
      var checked=[];
      // 개인 습관 (공개 설정된 것)
      Object.keys(mH).forEach(function(hid){
        if(hid.startsWith('__'))return;
        var hab=mH[hid];
        if(hab&&memVis[hid]&&hab.checks&&hab.checks[todayKey])checked.push(hab.name);
      });
      // 공용 습관 (관리자가 공개 설정 or 멤버가 공개 설정)
      Object.keys(AH).forEach(function(ahid){
        var ah=AH[ahid];
        if(!ah||(!(ah.members||[]).includes(mem.id)))return;
        var vis=(ah.visibility&&ah.visibility[mem.id])||memVis['__admin__'+ahid];
        var ck2=mH['__admin__'+ahid]&&mH['__admin__'+ahid].checks&&mH['__admin__'+ahid].checks[todayKey];
        if(vis&&ck2)checked.push(ah.name+'(공용)');
      });
      if(checked.length)todayCheckers.push({mem:mem,habits:checked});
    });
    if(!todayCheckers.length){

    } else {

        h+='<div style="display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid #F3F4F6;">';
        h+='<span style="font-size:13px;font-weight:700;min-width:80px;">'+esc(tc.mem.name)+'</span>';
        h+='<div style="display:flex;flex-wrap:wrap;gap:4px;">';
        tc.habits.forEach(function(hn){h+='<span style="font-size:11px;padding:2px 8px;background:var(--prl);color:var(--pr);border-radius:20px;font-weight:600;">'+esc(hn)+'</span>';});
        h+='</div></div>';
      });
    }
    h+='</div>';
    // 이번 주 달성률 (주중만)
    h+='<div class="sec rb" style="padding:.875rem;">';
    h+='<div style="font-size:13px;font-weight:700;color:var(--pr);margin-bottom:10px;">📊 이번 주 달성률 <span style="font-size:11px;font-weight:400;color:var(--mu);">(주중·공개)</span></div>';
    var weekRows=[];
    S.members.forEach(function(mem){
      var mH=H[mem.id]||{};
      var memVis=(H.__vis&&H.__vis[mem.id])||{};
      var hids=Object.keys(mH).filter(function(hid){return !hid.startsWith('__')&&memVis[hid];});
      if(!hids.length)return;
      var total=0,done=0,bonus=0;
      for(var i=0;i<7;i++){
        var dd=new Date(today);dd.setDate(dd.getDate()-i);
        var dk=dateKey(dd);
        if(isOff(dd)){
          hids.forEach(function(hid){if(mH[hid]&&mH[hid].checks&&mH[hid].checks[dk])bonus++;});
          continue;
        }
        hids.forEach(function(hid){total++;if(mH[hid]&&mH[hid].checks&&mH[hid].checks[dk])done++;});
      }
      if(total)weekRows.push({mem:mem,pct:Math.round(done/total*100),done:done,total:total,bonus:bonus});
    });
    weekRows.sort(function(a,b){return b.pct-a.pct;});
    if(!weekRows.length){
      h+='<div style="text-align:center;color:var(--mu);font-size:13px;">공개 데이터가 없어요</div>';
    } else {
      weekRows.forEach(function(r){
        var col=r.pct>=80?'var(--pr)':r.pct>=50?'#F59E0B':'var(--mu)';
        h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">';
        h+='<span style="font-size:12px;min-width:72px;font-weight:600;">'+esc(r.mem.name)+'</span>';
        h+='<div style="flex:1;height:8px;background:#F3F4F6;border-radius:4px;overflow:hidden;"><div style="width:'+r.pct+'%;height:100%;background:'+col+';border-radius:4px;"></div></div>';
        h+='<span style="font-size:11px;font-weight:700;color:'+col+';min-width:32px;">'+r.pct+'%</span>';
        if(r.bonus>0)h+='<span style="font-size:10px;color:#16A34A;font-weight:700;">+'+r.bonus+'🎁</span>';
        h+='</div>';
      });
    }
    h+='</div>';
  }

  return h+'</div>';
}

function bRows(){
  var rows=[];
  if(S.rptMode==='study'){
    var ss=S.rptSid?S.studies.filter(function(s){return s.id===S.rptSid;}):S.studies.filter(function(s){return s.active;});
    ss.forEach(function(s){
      var aw=allWeeks(s);var wks=S.rptWeek?aw.filter(function(w){return w.num===+S.rptWeek;}):aw;
      wks.forEach(function(w){
        S.members.filter(function(m){return(m.studyIds||[]).indexOf(s.id)>=0;}).forEach(function(m){
          rows.push({mem:m.name,mid:m.id,study:s.name,sid:s.id,cat:s.cat,week:w.num,tw:aw.length,locked:w.locked,st:ck(s.id,w.num,m.id)});
        });
      });
    });
  } else {
    var ms=S.rptMid?S.members.filter(function(m){return m.id===S.rptMid;}):S.members;
    ms.forEach(function(m){
      S.studies.filter(function(s){return s.active&&(m.studyIds||[]).indexOf(s.id)>=0;}).forEach(function(s){
        allWeeks(s).forEach(function(w){
          rows.push({mem:m.name,mid:m.id,study:s.name,sid:s.id,cat:s.cat,week:w.num,tw:allWeeks(s).length,locked:w.locked,st:ck(s.id,w.num,m.id)});
        });
      });
    });
  }
  return rows;
}

function xCsv(){
  var rows=bRows();var lines=[['멤버','스터디','카테고리','주차','총주차','잠금','상태'].join(',')];
  rows.forEach(function(r){
    var row=[r.mem,r.study,r.cat,r.week+'주차',r.tw+'주',r.locked?'잠금':'열림',r.st==='done'?'인증완료':r.st==='vacation'?'휴가':'미인증'];
    lines.push(row.map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(','));
  });
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+lines.join('\r\n')],{type:'text/csv;charset=utf-8;'}));
  a.download='스터디인증.csv';document.body.appendChild(a);a.click();document.body.removeChild(a);
}
function xCopy(){
  var rows=bRows();var lines=[['멤버','스터디','카테고리','주차','총주차','잠금','상태'].join('\t')];
  rows.forEach(function(r){lines.push([r.mem,r.study,r.cat,r.week+'주차',r.tw+'주',r.locked?'잠금':'열림',r.st==='done'?'인증완료':r.st==='vacation'?'휴가':'미인증'].join('\t'));});
  navigator.clipboard.writeText(lines.join('\n')).then(function(){alert('복사됐어요! 구글시트에서 Ctrl+V 하세요');}).catch(function(){alert('복사 실패. CSV를 이용해주세요.');});
}

  qsa('.notice-img',function(el){el.addEventListener('error',function(){el.style.display='none';});});
  // 이미지 파일 업로드
  var ntImgData='';
  function compressImage(file,cb){
    var reader=new FileReader();
    reader.onload=function(e){
      var img=new Image();
      img.onload=function(){
        var MAX=900;var w=img.width,h=img.height;
        if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
        if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
        var cv=document.createElement('canvas');cv.width=w;cv.height=h;
        var ctx=cv.getContext('2d');ctx.drawImage(img,0,0,w,h);
        var out=cv.toDataURL('image/jpeg',0.6);
        if(out.length>500000){out=cv.toDataURL('image/jpeg',0.4);}
        if(out.length>700000){alert('이미지가 너무 커요. 더 작은 이미지를 사용해주세요.');return;}
        cb(out);
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  }
  function setNtPreview(dataUrl){
    ntImgData=dataUrl;
    var prev=g('nt-preview');var pimg=g('nt-preview-img');
    if(prev&&pimg){pimg.src=dataUrl;prev.style.display='block';}
    var drop=g('nt-drop');if(drop)drop.style.display='none';
  }
  var ntDrop=g('nt-drop');var ntFile=g('nt-file');
  if(ntDrop){
    ntDrop.addEventListener('click',function(){if(ntFile)ntFile.click();});
    ntDrop.addEventListener('dragover',function(e){e.preventDefault();ntDrop.style.borderColor='var(--pr)';});
    ntDrop.addEventListener('dragleave',function(){ntDrop.style.borderColor='var(--br)';});

function doAM(){
  var n=S.newMember.trim();if(!n){render();return;}

  var cbs=document.querySelectorAll('.nm-study-cb:checked');
  var studyIds=[];cbs.forEach(function(cb){studyIds.push(cb.value);});
  S.members.push({id:uid(),name:n,pw:pw,studyIds:studyIds});
  S.members.sort(function(a,b){try{return a.name.localeCompare(b.name,'ko');}catch(e){return a.name<b.name?-1:a.name>b.name?1:0;}});

    if(s.dayOfWeek===undefined)s.dayOfWeek='';
    if(s.bandUrl===undefined)s.bandUrl='';
    if(s.startDate===undefined)s.startDate='';
    if(!s.snotices)s.snotices=[];
    s.weeks.forEach(function(w){if(w.materialUrl===undefined)w.materialUrl='';if(w.note===undefined)w.note='';});
  });
  // catOrder: Firebase에 저장된 순서 로드, 없으면 studies에서 추출
  var allCats=[];S.studies.forEach(function(s){if(allCats.indexOf(s.cat)<0)allCats.push(s.cat);});
  var savedOrder=d&&d.catOrder&&d.catOrder.length?d.catOrder:[];
  // 저장된 순서 기준으로 정렬, 새 카테고리는 맨 뒤에 추가
  S.events=d&&d.events?d.events:{};
  S.catOrder=savedOrder.filter(function(c){return allCats.indexOf(c)>=0;});
  allCats.forEach(function(c){if(S.catOrder.indexOf(c)<0)S.catOrder.push(c);});
  S.members.sort(function(a,b){try{return a.name.localeCompare(b.name,'ko');}catch(e){return a.name<b.name?-1:a.name>b.name?1:0;}});
  S.loading=false;render();
}
(async function(){
  render();
  var coreData=null;
  try{coreData=await fbLoad();}
  catch(e1){
    // 1회 재시도
    try{await new Promise(function(r){setTimeout(r,1500);});coreData=await fbLoad();}
    catch(e2){
      S.loading=false;
      var app=document.getElementById('app');
      if(app)app.innerHTML='<div class="loading">로드 실패. 인터넷 연결을 확인하고 새로고침해주세요.<br><br><button onclick="location.reload()" style="padding:.6rem 1.25rem;border-radius:20px;background:linear-gradient(135deg,#E91E8C,#7B2FF7);color:#fff;border:none;font-weight:700;cursor:pointer;">새로고침</button></div>';
      return;
    }
  }
  applyData(coreData);
  // 공지(이미지 포함)는 별도 경로에서 비동기로, 실패해도 앱은 정상 작동
  fbLoadNotices().then(function(nd){S.notices=nd||{};render();}).catch(function(){S.notices={};
  });
  fbLoadHabits().then(function(hd){S.habits=hd||{};render();}).catch(function(){S.habits={};
  });
  fbLoadAdminHabits().then(function(ad){S.adminHabits=ad||{};render();}).catch(function(){S.adminHabits={};
  });
})();


</script>
