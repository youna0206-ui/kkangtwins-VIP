function ckKey(sid,wn,mid){return sid+'__'+wn+'__'+mid;}
function ck(sid,wn,mid){return S.checkins[ckKey(sid,wn,mid)]||null;}
function setCk(sid,wn,mid,val){var k=ckKey(sid,wn,mid);if(val)S.checkins[k]=val;else delete S.checkins[k];}

// 스터디의 열린(미잠금) 주차 목록
function openWeeks(s){return (s.weeks||[]).filter(function(w){return !w.locked;});}
// 전체 주차 목록
function allWeeks(s){return s.weeks||[];}

// 멤버의 이번 열린 주차 기준 통계
function memCurStats(m){
  var my=S.studies.filter(function(s){return s.active&&(m.studyIds||[]).indexOf(s.id)>=0;});
  var done=0,total=0;
  my.forEach(function(s){
    var ow=openWeeks(s);
    total+=ow.length;
    ow.forEach(function(w){if(ck(s.id,w.num,m.id)==='done')done++;});
  });
  return{total:total,done:done,pct:total?Math.round(done/total*100):0};
}
// 멤버 전체 누적 통계
function memTotalStats(m){
  var my=S.studies.filter(function(s){return s.active&&(m.studyIds||[]).indexOf(s.id)>=0;});
  var tw=0,dw=0,vw=0;
  my.forEach(function(s){
    var aw=allWeeks(s);
    tw+=aw.length;
    aw.forEach(function(w){
      var st=ck(s.id,w.num,m.id);
      if(st==='done')dw++;
      else if(st==='vacation')vw++;
    });
  });
  return{tw:tw,dw:dw,vw:vw,pct:tw?Math.round(dw/tw*100):0,cnt:my.length};
}
// 스터디+멤버 통계
function sMSt(s,m){
  var aw=allWeeks(s);var dn=0,vc=0;
  aw.forEach(function(w){var st=ck(s.id,w.num,m.id);if(st==='done')dn++;else if(st==='vacation')vc++;});
  return{t:aw.length,dn:dn,vc:vc,pct:aw.length?Math.round(dn/aw.length*100):0};
}

  f+='</div>';
  var sm=rows.length>0?'<div class="rsum">'+
    '<div class="rsbox"><div class="rsnum" style="color:var(--pr);">'+rows.length+'</div><div class="rslbl">전체</div></div>'+
    '<div class="rsbox"><div class="rsnum" style="color:var(--gr);">'+dc+'</div><div class="rslbl">✅인증</div></div>'+
    '<div class="rsbox"><div class="rsnum" style="color:var(--bld);">'+vc+'</div><div class="rslbl">🏖️휴가</div></div>'+
    '<div class="rsbox"><div class="rsnum" style="color:var(--or);">'+wc+'</div><div class="rslbl">⏳미인증</div></div>'+
    '<div class="rsbox"><div class="rsnum" style="color:var(--pr);">'+pt+'%</div><div class="rslbl">인증률</div></div></div>':'';
  var tb='';
  if(rows.length>0){
    var tr=rows.map(function(r){
      var badge=r.st==='done'?'<span class="bd">✓인증</span>':r.st==='vacation'?'<span class="bv">🏖️휴가</span>':'<span class="bw">미인증</span>';
      return '<tr><td style="font-weight:500;white-space:nowrap;">'+esc(r.mem)+'</td><td>'+esc(r.study)+'</td>'+
        '<td style="white-space:nowrap;">'+(r.locked?'🔒':'')+r.week+'/'+r.tw+'주</td><td>'+badge+'</td></tr>';
    }).join('');
    tb='<div class="tscroll"><table class="rtable"><thead><tr><th>멤버</th><th>스터디</th><th>주차</th><th>상태</th></tr></thead><tbody>'+tr+'</tbody></table></div>'+
      '<div style="display:flex;gap:8px;"><button class="abtn" id="rcs" style="flex:1;">📥 CSV 다운로드</button>'+
      '<button class="abtn sec" id="rcp" style="flex:1;">📋 구글시트 복사</button></div>';
  } else {tb='<div class="empty">조회 결과가 없어요</div>';}
  return '<div class="stack">'+f+sm+tb+'</div>';
}

function xCsv(){
  var rows=bRows();
  var lines=[['멤버','스터디','카테고리','주차','총주차','잠금여부','상태'].join(',')];
  rows.forEach(function(r){
    var row=[r.mem,r.study,r.cat,r.week+'주차',r.tw+'주',r.locked?'잠금':'열림',r.st==='done'?'인증완료':r.st==='vacation'?'휴가':'미인증'];
    lines.push(row.map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(','));
  });
  var csv='﻿'+lines.join('\r\n');
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download='스터디인증.csv';document.body.appendChild(a);a.click();document.body.removeChild(a);
}
function xCopy(){
  var rows=bRows();
  var lines=[['멤버','스터디','카테고리','주차','총주차','잠금여부','상태'].join('\t')];
  rows.forEach(function(r){
    lines.push([r.mem,r.study,r.cat,r.week+'주차',r.tw+'주',r.locked?'잠금':'열림',r.st==='done'?'인증완료':r.st==='vacation'?'휴가':'미인증'].join('\t'));
  });
  navigator.clipboard.writeText(lines.join('\n'))
    .then(function(){alert('복사됐어요! 구글시트에서 Ctrl+V 하세요');})
    .catch(function(){alert('복사 실패. CSV 다운로드를 이용해주세요.');});
}

function rST(){
  if(!S.isAdmin)return rAL();
  var cats=[];S.studies.forEach(function(s){if(cats.indexOf(s.cat)<0)cats.push(s.cat);});
  var h='<div class="stack" style="gap:22px;">';

  // 주차 관리
  h+='<div><div class="st">📅 스터디별 주차 관리</div>'+
    '<div style="font-size:12px;color:var(--mu);margin-bottom:10px;">주차를 추가하고 잠금/열기로 인증 버튼을 조절하세요<br>🔓 열림: 엄마들이 인증 가능 | 🔒 잠금: 수정 불가 (읽기만)</div>';
  cats.forEach(function(cat){
    var cs=S.studies.filter(function(s){return s.cat===cat&&s.active;});if(!cs.length)return;
    h+='<div style="margin-bottom:12px;"><div class="cat-hd">'+esc(cat)+'</div>';
    cs.forEach(function(s){
      var aw=allWeeks(s);
      h+='<div style="background:var(--wh);border:1.5px solid #F3D0E9;border-radius:var(--rs);padding:.75rem .875rem;margin-bottom:6px;">'+
        '<div style="font-size:13px;font-weight:600;margin-bottom:8px;">'+esc(s.name)+'</div>'+
        '<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;">';
      aw.forEach(function(w){
        var isLocked=w.locked;
        h+='<div class="wk-row" style="flex:none;min-width:0;padding:.4rem .6rem;gap:6px;">'+
          '<span style="font-size:12px;font-weight:600;color:var(--tx);">'+w.num+'주차</span>'+
          '<button class="lock-btn '+(isLocked?'locked':'open')+'" data-lock="'+s.id+'__'+w.num+'">'+(isLocked?'🔒 잠금':'🔓 열림')+'</button>'+
        '</div>';
      });
      h+='<button class="add-wk-btn" data-addwk="'+s.id+'">+ 주차 추가</button></div></div>';
    });
    h+='</div>';
  });
  h+='</div>';

  // 멤버 관리
  h+='<div><div class="st">👥 멤버 관리</div>'+
    '<div class="ir"><input type="text" id="nm" placeholder="새 멤버 이름" value="'+esc(S.newMember)+'"><button class="abtn" id="am">+ 추가</button></div>'+
    '<div class="stack">';
  if(!S.members.length)h+='<div class="empty" style="padding:.5rem 0;">멤버가 없어요</div>';
  var cs2=S.studies.filter(function(s){return s.active;});
  S.members.forEach(function(m){
    var ix=S.expandedMem===m.id;
    h+='<div><div class="card rb" style="padding:.65rem .875rem;">'+
      '<div><span style="font-size:14px;font-weight:500;">'+esc(m.name)+'</span><span style="font-size:11px;color:var(--mu);margin-left:6px;">비번:'+esc(m.pw)+'</span></div>'+
      '<div style="display:flex;gap:6px;align-items:center;"><span style="font-size:12px;color:var(--mu);">'+(m.studyIds||[]).length+'개</span>'+
      '<button class="actb" data-mx="'+m.id+'">'+(ix?'닫기':'배정')+'</button>'+
      '<button class="dlb" data-md="'+m.id+'">🗑</button></div></div>';
    if(ix){
      var cts=[];cs2.forEach(function(s){if(cts.indexOf(s.cat)<0)cts.push(s.cat);});
      h+='<div class="mexp"><div class="mexp-hd">'+esc(m.name)+'님 설정</div><div class="mexp-body">'+
        '<div style="margin-bottom:12px;"><div class="cat-hd" style="margin-bottom:6px;">비밀번호 변경</div>'+
        '<div style="display:flex;gap:8px;"><input class="ainp" type="text" id="ap'+m.id+'" placeholder="새 비밀번호" style="flex:1;" maxlength="20">'+
        '<button class="abtn sm" data-ap="'+m.id+'">변경</button></div></div>'+
        '<div class="cat-hd" style="margin-bottom:4px;">스터디 배정</div>';
      cts.forEach(function(cat){
        h+='<div class="cat-hd">'+esc(cat)+'</div>';
        cs2.filter(function(s){return s.cat===cat;}).forEach(function(s){
          h+='<label class="sc-label"><input type="checkbox" data-asgn="'+m.id+'__'+s.id+'"'+((m.studyIds||[]).indexOf(s.id)>=0?' checked':'')+'>'+esc(s.name)+'</label>';
        });
      });
      h+='</div></div>';
    }
    h+='</div>';
  });
  h+='</div></div>';

  // 스터디 활성화
  h+='<div><div class="st">📚 스터디 활성화</div>';
  cats.forEach(function(cat){
    h+='<div style="margin-bottom:8px;"><div class="cat-hd">'+esc(cat)+'</div>';
    S.studies.filter(function(s){return s.cat===cat;}).forEach(function(s){
      h+='<div class="stog"><span>'+esc(s.name)+'</span><button class="tgl '+(s.active?'on':'off')+'" data-stg="'+s.id+'"></button></div>';
    });
    h+='</div>';
  });
  h+='</div></div>';
  return h;
}

function rSetup(){
  return '<div class="hd"><div class="hd-left"><div class="hd-tag">@kkang_twins_</div><div class="hd-title">책육아 스터디</div></div></div>'+
    '<div class="sbox"><h2>Firebase 연결</h2><p>Firebase DB URL을 입력해주세요.</p>'+
    '<input class="sinp" id="su" type="text" placeholder="https://xxx-rtdb.firebaseio.com" value="'+esc(S.setupUrl)+'">'+
    (S.setupErr?'<p class="serr">'+esc(S.setupErr)+'</p>':'')+
    '<button class="abtn full" id="ss" style="margin-top:4px;">연결하기</button></div>';
}

function bAll(){
  document.querySelectorAll('[data-tab]').forEach(function(el){
    el.addEventListener('click',function(){S.tab=el.dataset.tab;S.chgErr='';S.chgOk='';render();});
  });
  function g(id){return document.getElementById(id);}
  function on(id,fn){var el=g(id);if(el)el.addEventListener('click',fn);}
  on('mlb',function(){S.tab='mlogin';render();});
  on('alb',function(){S.tab='alogin';render();});
  on('lo',function(){S.isAdmin=false;S.loggedMember=null;S.tab='mlogin';S.memberPw='';render();});
  var ms=g('msel');if(ms)ms.addEventListener('change',function(e){S.selMemId=e.target.value;});
  on('mdl',function(){
    var id=S.selMemId||(g('msel')?g('msel').value:'');
    var pw=g('mpw')?g('mpw').value:'';
    if(!id){S.memberErr='이름을 선택해주세요';render();return;}
    var m=S.members.filter(function(x){return x.id===id;})[0];
    if(!m){S.memberErr='멤버를 찾을 수 없어요';render();return;}
    if(m.pw!==pw){S.memberErr='비밀번호가 틀렸어요';render();return;}
    S.loggedMember=m;S.memberErr='';S.memberPw='';S.selMemId='';S.tab='ci';render();
  });
  on('adl',function(){
    var pw=g('apw')?g('apw').value:'';
    if(pw===ADMIN_PW){S.isAdmin=true;S.adminErr='';S.tab='overall';render();}
    else{S.adminErr='비밀번호가 틀렸어요';render();}
  });

  // 인증 버튼 - data-ck="mid__sid__weeknum__val"
  document.querySelectorAll('[data-ck]').forEach(function(el){
    el.addEventListener('click',function(){
      var p=el.dataset.ck.split('__');var mid=p[0],sid=p[1],wn=+p[2],val=p[3];
      setCk(sid,wn,mid,ck(sid,wn,mid)===val?null:val);persist();
    });
  });

  on('cps',function(){
    var m=S.loggedMember;if(!m)return;
    var cur=g('cc')?g('cc').value:'';var nw=g('cn')?g('cn').value:'';var nw2=g('cn2')?g('cn2').value:'';
    if(cur!==m.pw){S.chgErr='현재 비밀번호가 틀렸어요';S.chgOk='';render();return;}
    if(!nw){S.chgErr='새 비밀번호를 입력해주세요';S.chgOk='';render();return;}
    if(nw!==nw2){S.chgErr='새 비밀번호가 일치하지 않아요';S.chgOk='';render();return;}
    var ix=S.members.findIndex?S.members.findIndex(function(x){return x.id===m.id;}):
      (function(){for(var i=0;i<S.members.length;i++)if(S.members[i].id===m.id)return i;return -1;})();
    if(ix>=0){S.members[ix].pw=nw;S.loggedMember=JSON.parse(JSON.stringify(S.members[ix]));}
    S.chgErr='';S.chgOk='비밀번호가 변경됐어요 🎉';persist();
  });

  on('rsm',function(){S.rptMode='study';S.rptSid='';S.rptMid='';S.rptWeek='';render();});
  on('rmm',function(){S.rptMode='member';S.rptSid='';S.rptMid='';S.rptWeek='';render();});
  var rss=g('rss');if(rss)rss.addEventListener('change',function(e){S.rptSid=e.target.value;S.rptWeek='';render();});
  var rws=g('rws');if(rws)rws.addEventListener('change',function(e){S.rptWeek=e.target.value;render();});
  var rms=g('rms');if(rms)rms.addEventListener('change',function(e){S.rptMid=e.target.value;render();});
  on('rcs',xCsv);on('rcp',xCopy);

  // 주차 잠금/열기
  document.querySelectorAll('[data-lock]').forEach(function(el){
    el.addEventListener('click',function(){
      var p=el.dataset.lock.split('__');var sid=p[0],wn=+p[1];
      var s=S.studies.filter(function(x){return x.id===sid;})[0];if(!s)return;
      var w=s.weeks.filter(function(x){return x.num===wn;})[0];if(!w)return;
      w.locked=!w.locked;persist();
    });
  });

  // 주차 추가
  document.querySelectorAll('[data-addwk]').forEach(function(el){
    el.addEventListener('click',function(){
      var s=S.studies.filter(function(x){return x.id===el.dataset.addwk;})[0];if(!s)return;
      var aw=allWeeks(s);
      var nextNum=aw.length>0?aw[aw.length-1].num+1:1;
      s.weeks.push({num:nextNum,locked:false});persist();
    });
  });

  var nm=g('nm');if(nm){nm.addEventListener('input',function(e){S.newMember=e.target.value;});nm.addEventListener('keydown',function(e){if(e.key==='Enter')doAM();});}
  on('am',doAM);
  document.querySelectorAll('[data-mx]').forEach(function(el){
    el.addEventListener('click',function(){S.expandedMem=S.expandedMem===el.dataset.mx?null:el.dataset.mx;render();});
  });
  document.querySelectorAll('[data-md]').forEach(function(el){
    el.addEventListener('click',function(){doDM(el.dataset.md);});
  });
  document.querySelectorAll('[data-asgn]').forEach(function(el){
    el.addEventListener('change',function(e){
      var p=e.target.dataset.asgn.split('__');var mid=p[0],sid=p[1];
      var m=S.members.filter(function(x){return x.id===mid;})[0];if(!m)return;
      m.studyIds=m.studyIds||[];
      if(e.target.checked){if(m.studyIds.indexOf(sid)<0)m.studyIds.push(sid);}
      else m.studyIds=m.studyIds.filter(function(x){return x!==sid;});
      persist();
    });
  });
  document.querySelectorAll('[data-ap]').forEach(function(el){
    el.addEventListener('click',function(){
      var mid=el.dataset.ap;var inp=g('ap'+mid);if(!inp)return;
      var nv=inp.value.trim();if(!nv){alert('새 비밀번호를 입력해주세요');return;}
      var m=S.members.filter(function(x){return x.id===mid;})[0];if(!m)return;
      m.pw=nv;persist();inp.value='';alert(m.name+'님 비번 변경 완료!');
    });
  });
  document.querySelectorAll('[data-stg]').forEach(function(el){
    el.addEventListener('click',function(){
      var s=S.studies.filter(function(x){return x.id===el.dataset.stg;})[0];
      if(s){s.active=!s.active;persist();}
    });
  });
}

function bSetup(){
  var u=g2('su');if(u)u.addEventListener('input',function(e){S.setupUrl=e.target.value;});
  var b=g2('ss');if(!b)return;
  b.addEventListener('click',function(){
    var url=S.setupUrl.trim();
    while(url.length&&url[url.length-1]==='/')url=url.slice(0,-1);
    if(!url||url.indexOf('https://')<0){S.setupErr='올바른 URL을 입력해주세요';render();return;}
    S.setupErr='';
    fetch(url+DB_PATH).then(function(r){return r.ok?r.json():Promise.resolve({});})
      .then(function(d){localStorage.setItem('fb_url',url);S.loading=true;render();applyData(d||{});})
      .catch(function(){S.setupErr='연결 실패. URL을 확인해주세요';render();});
  });
}
function g2(id){return document.getElementById(id);}

function doAM(){
  var n=S.newMember.trim();
  if(!n||S.members.filter(function(m){return m.name===n;}).length){S.newMember='';render();return;}
  S.members.push({id:uid(),name:n,pw:'0000',studyIds:[]});S.newMember='';persist();
}
function doDM(id){
  if(!confirm('이 멤버를 삭제할까요?'))return;
  S.members=S.members.filter(function(m){return m.id!==id;});
  if(S.expandedMem===id)S.expandedMem=null;persist();
}
async function persist(){
  S.saving=true;render();
  try{await fbSave({studies:S.studies,members:S.members,checkins:S.checkins});}
  catch(e){alert('저장 실패. 인터넷 연결을 확인해주세요.');}
  S.saving=false;render();
}
function applyData(d){
  S.studies=d&&d.studies&&d.studies.length?d.studies:JSON.parse(JSON.stringify(DEFAULT_STUDIES));
  S.members=d&&d.members&&d.members.length?d.members:JSON.parse(JSON.stringify(DEFAULT_MEMBERS));
  S.checkins=d&&d.checkins?d.checkins:{};
  // 마이그레이션: weeks 없으면 생성
  S.studies.forEach(function(s){
    if(!s.weeks||!s.weeks.length){
      s.weeks=[{num:1,locked:false}];
    }
  });
  S.loading=false;render();
}
(async function(){
  render();if(!isReady())return;
  try{applyData(await fbLoad());}
  catch(e){
    S.loading=false;
    var app=document.getElementById('app');
    if(app)app.innerHTML='<div class="loading">로드 실패. 페이지를 새로고침해주세요.</div>';
  }
})();

</script>
