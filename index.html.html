function fbUrl(){return localStorage.getItem('fb_url')||'';}
function isReady(){return!!fbUrl();}
async function fbLoad(){
  const r=await fetch(fbUrl()+DB_PATH);
  if(!r.ok)throw new Error(r.status);
  return await r.json()||{};
}
async function fbSave(d){
  const r=await fetch(fbUrl()+DB_PATH,{
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(d)
  });
  if(!r.ok)throw new Error(r.status);
}

function uid(){return 'm'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}

function memCurStats(m){
  var my=S.studies.filter(function(s){return s.active&&(m.studyIds||[]).includes(s.id);});
  var done=my.filter(function(s){return ck(s.id,s.week,m.id)==='done';}).length;
  var vac=my.filter(function(s){return ck(s.id,s.week,m.id)==='vacation';}).length;
  return{total:my.length,done:done,vac:vac,pct:my.length?Math.round(done/my.length*100):0};
}
function memTotalStats(m){
  var my=S.studies.filter(function(s){return s.active&&(m.studyIds||[]).includes(s.id);});
  var totalWks=0,doneWks=0,vacWks=0;
  my.forEach(function(s){
    var tw=s.totalWeeks||s.week;
    totalWks+=tw;
    for(var w=1;w<=tw;w++){
      var st=ck(s.id,w,m.id);
      if(st==='done')doneWks++;
      else if(st==='vacation')vacWks++;
    }
  });
  return{totalWks:totalWks,doneWks:doneWks,vacWks:vacWks,
    pct:totalWks?Math.round(doneWks/totalWks*100):0,studies:my.length};
}
function studyMemberStats(s,m){
  var tw=s.totalWeeks||s.week;
  var done=0,vac=0;
  for(var w=1;w<=tw;w++){
    var st=ck(s.id,w,m.id);
    if(st==='done')done++;
    else if(st==='vacation')vac++;
  }
  return{totalWks:tw,done:done,vac:vac,pct:tw?Math.round(done/tw*100):0};
}

function render(){
  var app=document.getElementById('app');
  if(!isReady()){app.innerHTML=renderSetup();bindSetup();return;}
  if(S.loading){app.innerHTML='<div class="loading"><div class="sp"></div>불러오는 중...</div>';return;}
  app.innerHTML=renderApp();bindAll();
}

function buildRows(){
  var rows=[];
  if(S.rptMode==='study'){
    var studies=S.rptStudyId
      ?S.studies.filter(function(s){return s.id===S.rptStudyId;})
      :S.studies.filter(function(s){return s.active;});
    studies.forEach(function(s){
      var max=s.totalWeeks||s.week;
      var weeks=S.rptWeek?[+S.rptWeek]:[];
      if(!S.rptWeek){for(var i=1;i<=max;i++)weeks.push(i);}
      weeks.forEach(function(w){
        S.members.filter(function(m){return(m.studyIds||[]).includes(s.id);}).forEach(function(m){
          rows.push({mem:m.name,study:s.name,cat:s.cat,week:w,totalWeeks:max,date:wLabel(s,w),status:ck(s.id,w,m.id)});
        });
      });
    });
  } else {
    var members=S.rptMemberId
      ?S.members.filter(function(m){return m.id===S.rptMemberId;})
      :S.members;
    members.forEach(function(m){
      S.studies.filter(function(s){return s.active&&(m.studyIds||[]).includes(s.id);}).forEach(function(s){
        var max=s.totalWeeks||s.week;
        for(var w=1;w<=max;w++){
          rows.push({mem:m.name,study:s.name,cat:s.cat,week:w,totalWeeks:max,date:wLabel(s,w),status:ck(s.id,w,m.id)});
        }
      });
    });
  }
  return rows;
}

function renderReport(){

  var active=S.studies.filter(function(s){return s.active;});
  var studyOpts='<option value="">전체 스터디</option>';
  active.forEach(function(s){
    studyOpts+='<option value="'+s.id+'"'+(S.rptStudyId===s.id?' selected':'')+'>'+esc('['+s.cat+'] '+s.name)+'</option>';
  });
  var weekOpts='<option value="">전체 주차</option>';
  if(S.rptStudyId){
    var rs=S.studies.find(function(x){return x.id===S.rptStudyId;});
    if(rs){
      var maxW=rs.totalWeeks||rs.week;
      for(var wi=1;wi<=maxW;wi++){
        var wl2=wLabel(rs,wi);
        weekOpts+='<option value="'+wi+'"'+(String(S.rptWeek)===String(wi)?' selected':'')+'>'+wi+'주차'+(wl2?' ('+esc(wl2)+')':'')+'</option>';

  var rows=buildRows();
  var doneCnt=rows.filter(function(r){return r.status==='done';}).length;
  var vacCnt=rows.filter(function(r){return r.status==='vacation';}).length;

      '<button class="abtn sm'+(S.rptMode==='member'?'':' sec')+'" id="rpt-member-mode">👤 멤버별</button>'+
    '</div>';

  if(S.rptMode==='study'){
    filterHtml+='<div class="frow">'+
      '<div class="fg"><label>스터디</label><select id="rpt-study" style="margin:0;font-size:13px;padding:.5rem .65rem;">'+studyOpts+'</select></div>'+
      '<div class="fg"><label>주차</label><select id="rpt-week" style="margin:0;font-size:13px;padding:.5rem .65rem;">'+weekOpts+'</select></div>'+
    '</div>';
  } else {
    filterHtml+='<div class="fg"><label>멤버</label><select id="rpt-member" style="margin:0;font-size:13px;padding:.5rem .65rem;">'+memberOpts+'</select></div>';
  }

    '<div class="rsum">'+
      '<div class="rsbox"><div class="rsnum" style="color:var(--pr);">'+rows.length+'</div><div class="rslbl">전체</div></div>'+
      '<div class="rsbox"><div class="rsnum" style="color:var(--gr);">'+doneCnt+'</div><div class="rslbl">✅ 인증</div></div>'+
      '<div class="rsbox"><div class="rsnum" style="color:var(--bld);">'+vacCnt+'</div><div class="rslbl">🏖️ 휴가</div></div>'+
      '<div class="rsbox"><div class="rsnum" style="color:var(--or);">'+waitCnt+'</div><div class="rslbl">⏳ 미인증</div></div>'+
      '<div class="rsbox"><div class="rsnum" style="color:var(--pr);">'+pctTotal+'%</div><div class="rslbl">인증률</div></div>'+

    var trows=rows.map(function(r){
      var badge=r.status==='done'?'<span class="bd">✓ 인증</span>':r.status==='vacation'?'<span class="bv">🏖️ 휴가</span>':'<span class="bw">미인증</span>';
      return '<tr>'+

    tableHtml='<div class="empty">조회 결과가 없어요</div>';
  }

  return '<div class="stack">'+filterHtml+summaryHtml+tableHtml+'</div>';
}

function exportCsv(){
  var rows=buildRows();
  var hdr=['멤버','스터디','카테고리','주차','총주차','날짜','상태'];
  var lines=[hdr.join(',')];
  rows.forEach(function(r){
    var row=[r.mem,r.study,r.cat,r.week+'주차',r.totalWeeks+'주',r.date||'',
      r.status==='done'?'인증완료':r.status==='vacation'?'휴가':'미인증'];
    lines.push(row.map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(','));
  });
  var csv='\uFEFF'+lines.join('\r\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='스터디인증_'+(S.rptMode==='study'?'스터디별':'멤버별')+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}

function copyTsv(){
  var rows=buildRows();
  var hdr=['멤버','스터디','카테고리','주차','총주차','날짜','상태'];
  var lines=[hdr.join('\t')];
  rows.forEach(function(r){
    lines.push([r.mem,r.study,r.cat,r.week+'주차',r.totalWeeks+'주',r.date||'',
      r.status==='done'?'인증완료':r.status==='vacation'?'휴가':'미인증'].join('\t'));
  });
  var tsv=lines.join('\n');
  navigator.clipboard.writeText(tsv)
    .then(function(){alert('복사됐어요!\n구글시트 셀 클릭 후 Ctrl+V 하세요 😊');})
    .catch(function(){alert('복사 실패. CSV 다운로드를 이용해주세요.');});
}

function bindAll(){
  document.querySelectorAll('[data-tab]').forEach(function(el){
    el.addEventListener('click',function(){S.tab=el.dataset.tab;S.chgPwErr='';S.chgPwOk='';render();});
  });
  var mlb=document.getElementById('mem-login-btn');
  if(mlb)mlb.addEventListener('click',function(){S.tab='memLogin';render();});
  var alb=document.getElementById('adm-login-btn');
  if(alb)alb.addEventListener('click',function(){S.tab='admLogin';render();});
  var lo=document.getElementById('logout');
  if(lo)lo.addEventListener('click',function(){S.isAdmin=false;S.loggedMember=null;S.tab='memLogin';S.memberPw='';render();});

  var ms=document.getElementById('mem-sel');
  if(ms)ms.addEventListener('change',function(e){S._memSelId=e.target.value;});
  var mp=document.getElementById('mem-pw');
  if(mp){mp.addEventListener('input',function(e){S.memberPw=e.target.value;});
    mp.addEventListener('keydown',function(e){if(e.key==='Enter')doMemLogin();});}
  var mdl=document.getElementById('mem-do-login');
  if(mdl)mdl.addEventListener('click',doMemLogin);

  var ap=document.getElementById('adm-pw');
  if(ap){ap.addEventListener('input',function(e){S.adminPw=e.target.value;});
    ap.addEventListener('keydown',function(e){if(e.key==='Enter')doAdmLogin();});}
  var adl=document.getElementById('adm-do-login');
  if(adl)adl.addEventListener('click',doAdmLogin);

  document.querySelectorAll('[data-ck]').forEach(function(el){
    el.addEventListener('click',function(){
      var parts=el.dataset.ck.split('__');
      var mid=parts[0],sid=parts[1],val=parts[2];
      var s=S.studies.find(function(x){return x.id===sid;});
      if(!s)return;
      setCk(sid,s.week,mid,ck(sid,s.week,mid)===val?null:val);
      persist();
    });
  });

  var cc=document.getElementById('cpw-cur');if(cc)cc.addEventListener('input',function(e){S.chgPwCur=e.target.value;});
  var cn=document.getElementById('cpw-new');if(cn)cn.addEventListener('input',function(e){S.chgPwNew=e.target.value;});
  var cn2=document.getElementById('cpw-new2');if(cn2)cn2.addEventListener('input',function(e){S.chgPwNew2=e.target.value;});
  var cs=document.getElementById('cpw-save');if(cs)cs.addEventListener('click',doChangePw);

  var rsm=document.getElementById('rpt-study-mode');
  if(rsm)rsm.addEventListener('click',function(){S.rptMode='study';S.rptStudyId='';S.rptMemberId='';S.rptWeek='';render();});
  var rmm=document.getElementById('rpt-member-mode');
  if(rmm)rmm.addEventListener('click',function(){S.rptMode='member';S.rptStudyId='';S.rptMemberId='';S.rptWeek='';render();});
  var rss=document.getElementById('rpt-study');
  if(rss)rss.addEventListener('change',function(e){S.rptStudyId=e.target.value;S.rptWeek='';render();});
  var rws=document.getElementById('rpt-week');
  if(rws)rws.addEventListener('change',function(e){S.rptWeek=e.target.value;render();});
  var rms=document.getElementById('rpt-member');
  if(rms)rms.addEventListener('change',function(e){S.rptMemberId=e.target.value;render();});
  var rc=document.getElementById('rpt-csv');if(rc)rc.addEventListener('click',exportCsv);
  var rcp=document.getElementById('rpt-copy');if(rcp)rcp.addEventListener('click',copyTsv);

  document.querySelectorAll('[data-wm]').forEach(function(el){
    el.addEventListener('click',function(){
      var s=S.studies.find(function(x){return x.id===el.dataset.wm;});
      if(s&&s.week>1){s.week--;persist();}
    });
  });
  document.querySelectorAll('[data-wp]').forEach(function(el){
    el.addEventListener('click',function(){
      var s=S.studies.find(function(x){return x.id===el.dataset.wp;});
      if(s){s.week++;persist();}
    });
  });
  document.querySelectorAll('[data-tw]').forEach(function(el){
    el.addEventListener('change',function(e){
      var s=S.studies.find(function(x){return x.id===el.dataset.tw;});
      if(s){s.totalWeeks=Math.max(1,+e.target.value||1);persist();}
    });
  });
  document.querySelectorAll('[data-wdate]').forEach(function(el){
    el.addEventListener('blur',function(e){
      var parts=el.dataset.wdate.split('__');
      var sid=parts[0],w=+parts[1];
      var s=S.studies.find(function(x){return x.id===sid;});
      if(!s)return;
      if(!s.weekDates)s.weekDates={};
      s.weekDates[String(w)]=e.target.value.trim();
      persist();
    });
  });
  var nm=document.getElementById('new-mem');
  if(nm){nm.addEventListener('input',function(e){S.newMember=e.target.value;});
    nm.addEventListener('keydown',function(e){if(e.key==='Enter')doAddMem();});}
  var am=document.getElementById('add-mem');if(am)am.addEventListener('click',doAddMem);
  document.querySelectorAll('[data-mexp]').forEach(function(el){
    el.addEventListener('click',function(){S.expandedMem=S.expandedMem===el.dataset.mexp?null:el.dataset.mexp;render();});
  });
  document.querySelectorAll('[data-mdel]').forEach(function(el){
    el.addEventListener('click',function(){doDelMem(el.dataset.mdel);});
  });
  document.querySelectorAll('[data-assign]').forEach(function(el){
    el.addEventListener('change',function(e){
      var parts=e.target.dataset.assign.split('__');
      var mid=parts[0],sid=parts[1];
      var m=S.members.find(function(x){return x.id===mid;});
      if(!m)return;
      m.studyIds=m.studyIds||[];
      if(e.target.checked){if(!m.studyIds.includes(sid))m.studyIds.push(sid);}
      else m.studyIds=m.studyIds.filter(function(x){return x!==sid;});
      persist();
    });
  });
  document.querySelectorAll('[data-apw]').forEach(function(el){
    el.addEventListener('click',function(){
      var mid=el.dataset.apw;
      var inp=document.getElementById('apw-'+mid);if(!inp)return;
      var nv=inp.value.trim();if(!nv){alert('새 비밀번호를 입력해주세요');return;}
      var m=S.members.find(function(x){return x.id===mid;});if(!m)return;
      m.pw=nv;persist();inp.value='';alert(m.name+'님 비밀번호 변경 완료!');
    });
  });
  document.querySelectorAll('[data-stog]').forEach(function(el){
    el.addEventListener('click',function(){
      var s=S.studies.find(function(x){return x.id===el.dataset.stog;});
      if(s){s.active=!s.active;persist();}
    });
  });
}

function bindSetup(){
  var u=document.getElementById('s-url');
  if(u)u.addEventListener('input',function(e){S.setupUrl=e.target.value;});
  var b=document.getElementById('s-save');
  if(b)b.addEventListener('click',function(){
    var url=(S.setupUrl||'').trim();
    while(url.endsWith('/'))url=url.slice(0,-1);
    if(!url||!url.startsWith('https://')){S.setupErr='올바른 URL을 입력해주세요';render();return;}
    S.setupErr='';
    fetch(url+DB_PATH)
      .then(function(r){return r.ok?r.json():Promise.resolve({});})
      .then(function(data){localStorage.setItem('fb_url',url);S.loading=true;render();applyData(data||{});})
      .catch(function(){S.setupErr='연결 실패. URL을 확인해주세요';render();});
  });
}

function doMemLogin(){
  var selId=S._memSelId||(document.getElementById('mem-sel')?document.getElementById('mem-sel').value:'');
  var pw=S.memberPw||(document.getElementById('mem-pw')?document.getElementById('mem-pw').value:'');
  if(!selId){S.memberErr='이름을 선택해주세요';render();return;}
  var m=S.members.find(function(x){return x.id===selId;});
  if(!m){S.memberErr='멤버를 찾을 수 없어요';render();return;}
  if(m.pw!==pw){S.memberErr='비밀번호가 틀렸어요';render();return;}
  S.loggedMember=m;S.memberErr='';S.memberPw='';S._memSelId='';S.tab='checkin';render();
}
function doAdmLogin(){
  var pw=S.adminPw||(document.getElementById('adm-pw')?document.getElementById('adm-pw').value:'');
  if(pw===ADMIN_PW){S.isAdmin=true;S.adminErr='';S.adminPw='';S.tab='overall';render();}
  else{S.adminErr='비밀번호가 틀렸어요';render();}
}
function doChangePw(){
  var m=S.loggedMember;if(!m)return;
  var cur=document.getElementById('cpw-cur')?document.getElementById('cpw-cur').value:'';
  var nw=document.getElementById('cpw-new')?document.getElementById('cpw-new').value:'';
  var nw2=document.getElementById('cpw-new2')?document.getElementById('cpw-new2').value:'';
  if(cur!==m.pw){S.chgPwErr='현재 비밀번호가 틀렸어요';S.chgPwOk='';render();return;}
  if(!nw){S.chgPwErr='새 비밀번호를 입력해주세요';S.chgPwOk='';render();return;}
  if(nw!==nw2){S.chgPwErr='새 비밀번호가 일치하지 않아요';S.chgPwOk='';render();return;}
  var idx=S.members.findIndex(function(x){return x.id===m.id;});
  if(idx>=0){S.members[idx].pw=nw;S.loggedMember=Object.assign({},S.members[idx]);}
  S.chgPwErr='';S.chgPwOk='비밀번호가 변경됐어요 🎉';
  persist();
}
function doAddMem(){
  var n=S.newMember.trim();
  if(!n||S.members.find(function(m){return m.name===n;})){S.newMember='';render();return;}
  S.members.push({id:uid(),name:n,pw:'0000',studyIds:[]});
  S.newMember='';persist();
}
function doDelMem(id){
  if(!confirm('이 멤버를 삭제할까요?'))return;
  S.members=S.members.filter(function(m){return m.id!==id;});
  if(S.expandedMem===id)S.expandedMem=null;
  persist();
}
async function persist(){
  S.saving=true;render();
  try{
    await fbSave({studies:S.studies,members:S.members,checkins:S.checkins});
  }catch(e){
    alert('저장 실패. 인터넷 연결을 확인해주세요.');
  }
  S.saving=false;render();
}
function applyData(d){
  S.studies=d&&d.studies&&d.studies.length?d.studies:DEFAULT_STUDIES.slice();
  S.members=d&&d.members&&d.members.length?d.members:DEFAULT_MEMBERS.slice();
  S.checkins=d&&d.checkins?d.checkins:{};
  S.studies.forEach(function(s){
    if(!s.totalWeeks||s.totalWeeks<1)s.totalWeeks=8;
    if(!s.weekDates)s.weekDates={};
  });
  S.loading=false;render();
}
(async function(){
  if(!isReady()){render();return;}
  render();
  try{
    var data=await fbLoad();
    applyData(data);
  }catch(e){
    S.loading=false;
    document.getElementById('app').innerHTML='<div class="loading">❌ 로드 실패<br><span style="font-size:13px;">페이지를 새로고침해주세요</span></div>';
  }
})();

</script>
